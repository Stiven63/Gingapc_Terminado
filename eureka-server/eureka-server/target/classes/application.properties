# configuracion del servidor eureka
server.port=8761
spring.application.name=eureka-server

# estas dos propiedades evitan que eureka intente registrarse a si mismo
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# tiempo de espera al arrancar
eureka.server.wait-time-in-ms-when-sync-empty=0

# el dashboard de eureka queda disponible en http://localhost:8761
# desde ahi se puede ver cuales microservicios estan corriendo
