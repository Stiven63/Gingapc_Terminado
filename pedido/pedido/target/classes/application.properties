# configuracion del servidor
server.port=8085
spring.application.name=pedido-service

# base de datos mysql con laragon
spring.datasource.url=jdbc:mysql://localhost:3306/gingapc_pedido?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# jpa hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# eureka - registro del microservicio
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
